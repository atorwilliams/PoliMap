<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>United States – PoliMap</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/landing.css">
  <style>
    #map { width: 100%; height: 100%; }

    .president-strip {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 4px;
    }
    .president-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .president-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.3); margin-bottom: 2px; }
    .president-name { font-size: 0.9rem; font-weight: 600; color: #fff; }
    .president-sub { font-size: 0.75rem; color: rgba(255,255,255,0.45); }

    .detail-party-bar { height: 3px; border-radius: 2px; margin-bottom: 24px; }
    .detail-abbr { font-size: 2rem; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 4px; }
    .detail-name { font-size: 1.1rem; font-weight: 600; color: rgba(255,255,255,0.9); margin-bottom: 20px; }
    .detail-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.3); margin-bottom: 4px; display: block; }
    .detail-senator-name { font-size: 0.95rem; font-weight: 700; color: #fff; margin-bottom: 1px; }
    .detail-senator-party { font-size: 0.8rem; margin-bottom: 14px; }
    .detail-seats { display: flex; gap: 16px; margin-bottom: 28px; }
    .detail-seat-block {
      flex: 1; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 10px 12px;
    }
    .detail-seat-num { font-size: 1.4rem; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 3px; }
    .detail-seat-label { font-size: 0.68rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.08em; }
    .detail-explore-btn {
      display: block; padding: 10px 18px; background: #B22234; color: #fff;
      border: none; border-radius: 8px; font-weight: 700; font-size: 0.9rem;
      text-align: center; cursor: pointer; transition: background 0.15s; width: 100%;
    }
    .detail-explore-btn:hover { background: #8b1a28; }

    .landing-panel { transition: width 0.35s ease, padding 0.35s ease, opacity 0.25s ease; }
    .landing-split.map-mode .landing-panel {
      width: 0; padding-left: 0; padding-right: 0;
      overflow: hidden; opacity: 0; pointer-events: none;
    }
    #map-back-btn {
      position: absolute; top: 12px; left: 12px; z-index: 10;
      background: rgba(13,13,13,0.88); color: #fff;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
      padding: 7px 14px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; display: none; backdrop-filter: blur(4px);
      transition: background 0.15s;
    }
    #map-back-btn:hover { background: rgba(40,40,40,0.95); }
    #layer-switcher { min-width: 160px; }
  </style>
</head>
<body class="landing-body">

  <div class="landing-split">

    <div class="landing-panel">
      <a href="/" class="landing-wordmark" style="text-decoration:none;">
        <div class="landing-wordmark-main">PoliMap</div>
        <div class="landing-wordmark-sub">Ridings in Colour</div>
      </a>

      <div class="landing-mid">
        <div id="panel-list">
          <div id="president-strip-wrap"></div>
          <p class="landing-explore-label" style="margin-top:24px;">States</p>
          <nav class="landing-country-list" id="state-list"></nav>
        </div>

        <div id="panel-detail" style="display:none;">
          <button class="landing-footer-link" id="back-btn" style="margin-bottom:28px;font-size:0.82rem;">← All states</button>
          <div id="detail-content"></div>
        </div>
      </div>

      <footer class="landing-footer">
        <a class="landing-footer-link" href="/donate.html">Donate</a>
        <span class="landing-footer-sep">·</span>
        <a class="landing-footer-link" href="https://polichan.org" target="_blank">Forum</a>
      </footer>
    </div>

    <div class="landing-map-wrap">
      <div id="map"></div>
      <button id="map-back-btn">← All states</button>
      <div class="landing-map-fade"></div>
      <div id="map-controls-stack">
        <div id="layer-switcher" class="map-control" style="display:none;">
          <div class="control-header">Layer</div>
          <div id="layer-switcher-btns"></div>
        </div>
        <div id="legend" class="map-control legend-control" style="display:none;">
          <div class="control-header">Legend</div>
          <div id="legend-parties"></div>
        </div>
      </div>
    </div>

  </div>

  <div id="wip-notice">
    <p>PoliMap is under active development. Data and features are being added regularly.</p>
    <button id="wip-close" aria-label="Dismiss">×</button>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script type="module">

    function slug(name) { return name.toLowerCase().replace(/\s+/g, '-'); }

    const STATE_NAMES = {
      AL:'Alabama', AK:'Alaska', AZ:'Arizona', AR:'Arkansas', CA:'California',
      CO:'Colorado', CT:'Connecticut', DE:'Delaware', FL:'Florida', GA:'Georgia',
      HI:'Hawaii', ID:'Idaho', IL:'Illinois', IN:'Indiana', IA:'Iowa', KS:'Kansas',
      KY:'Kentucky', LA:'Louisiana', ME:'Maine', MD:'Maryland', MA:'Massachusetts',
      MI:'Michigan', MN:'Minnesota', MS:'Mississippi', MO:'Missouri', MT:'Montana',
      NE:'Nebraska', NV:'Nevada', NH:'New Hampshire', NJ:'New Jersey', NM:'New Mexico',
      NY:'New York', NC:'North Carolina', ND:'North Dakota', OH:'Ohio', OK:'Oklahoma',
      OR:'Oregon', PA:'Pennsylvania', RI:'Rhode Island', SC:'South Carolina',
      SD:'South Dakota', TN:'Tennessee', TX:'Texas', UT:'Utah', VT:'Vermont',
      VA:'Virginia', WA:'Washington', WV:'West Virginia', WI:'Wisconsin', WY:'Wyoming',
    };

    const PARTY_COLORS = {
      'Republican':  '#E81B23',
      'Democratic':  '#0015BC',
      'Independent': '#26A269',
    };

    const LAYERS = {
      states:    { file: './json/us_states.geojson', label: 'Senate (States)'  },
      districts: { file: './json/districts.geojson', label: 'House Districts'  },
    };

    const geoCache    = {};
    let membersData   = null;
    let governorsData = null;
    let selectedState = null;
    let activeLayer   = 'states';
    let popup         = null;
    let hoveredId     = null;
    let layerHandlers = null;

    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/positron',
      center: [-98, 39],
      zoom: 3.8,
      attributionControl: false,
    });
    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    async function loadGeo(key) {
      if (geoCache[key]) return geoCache[key];
      const res = await fetch(LAYERS[key].file);
      geoCache[key] = await res.json();
      return geoCache[key];
    }

    async function loadMembers() {
      if (membersData) return membersData;
      const res = await fetch('./json/membersData.json');
      membersData = await res.json();
      return membersData;
    }

    async function loadGovernors() {
      if (governorsData) return governorsData;
      const res = await fetch('./json/governors.json');
      governorsData = await res.json();
      return governorsData;
    }

    function stateColor(abbr) {
      const senators = membersData?.senate[abbr] || [];
      const parties  = senators.map(s => s.party);
      if (parties.every(p => p === 'Republican')) return '#E81B23';
      if (parties.every(p => p === 'Democratic')) return '#0015BC';
      return '#888888';
    }

    // ── Panel ─────────────────────────────────────────────────────────────────
    async function initPanel() {
      await Promise.all([loadMembers(), loadGovernors()]);

      document.getElementById('president-strip-wrap').innerHTML = `
        <div class="president-strip">
          <div class="president-dot" style="background:#E81B23;"></div>
          <div>
            <div class="president-label">President of the United States</div>
            <div class="president-name">Donald Trump</div>
            <div class="president-sub">Republican · Since January 2025</div>
          </div>
        </div>`;

      const list = document.getElementById('state-list');
      list.innerHTML = Object.entries(STATE_NAMES)
        .sort((a, b) => a[1].localeCompare(b[1]))
        .map(([abbr, name]) => `
          <div class="landing-country-item active" data-abbr="${abbr}" style="cursor:pointer;">
            <span class="landing-country-arrow">→</span>
            <span>${name}</span>
          </div>`).join('');

      list.querySelectorAll('.landing-country-item').forEach(el => {
        el.addEventListener('click', () => selectState(el.dataset.abbr));
      });
    }

    function selectState(abbr) {
      selectedState    = abbr;
      const name       = STATE_NAMES[abbr] || abbr;
      const senators   = membersData.senate[abbr] || [];
      const houseSeats = Object.keys(membersData.house).filter(k => k.startsWith(abbr + '-')).length;
      const governor   = governorsData?.[abbr];
      const color      = stateColor(abbr);
      const govColor   = governor?.party === 'Republican' ? '#E81B23'
                       : governor?.party === 'Democratic' ? '#0015BC' : '#888';
      const govSince   = governor?.since
        ? new Date(governor.since).toLocaleDateString('en-US', { year:'numeric', month:'long' })
        : '';
      const stSlug = name.toLowerCase().replace(/\s+/g, '-');

      document.getElementById('panel-list').style.display   = 'none';
      document.getElementById('panel-detail').style.display = 'block';

      document.getElementById('detail-content').innerHTML = `
        <div class="detail-party-bar" style="background:${color};"></div>
        <div class="detail-abbr">${abbr}</div>
        <div class="detail-name">${name}</div>

        ${governor ? `
        <span class="detail-label">Governor</span>
        <div class="detail-senator-name">${governor.name}</div>
        <div class="detail-senator-party" style="color:${govColor};margin-bottom:2px;">${governor.party}</div>
        <div style="font-size:0.78rem;color:rgba(255,255,255,0.35);margin-bottom:20px;">Since ${govSince}</div>
        ` : ''}

        <span class="detail-label">U.S. Senators</span>
        ${senators.map(s => {
          const c = PARTY_COLORS[s.party] || '#888';
          return `<div class="detail-senator-name">${s.name}</div>
                  <div class="detail-senator-party" style="color:${c};">${s.party}</div>`;
        }).join('') || '<div style="color:rgba(255,255,255,0.3);font-size:0.85rem;margin-bottom:14px;">No data</div>'}

        <div class="detail-seats">
          <div class="detail-seat-block">
            <div class="detail-seat-num">${houseSeats || '—'}</div>
            <div class="detail-seat-label">House seats</div>
          </div>
          <div class="detail-seat-block">
            <div class="detail-seat-num">2</div>
            <div class="detail-seat-label">Senators</div>
          </div>
        </div>

        <a href="/USA/${stSlug}/" class="detail-explore-btn">Explore ${name} →</a>
      `;

      highlightState(abbr);
    }

    document.getElementById('back-btn').addEventListener('click', () => {
      selectedState = null;
      document.getElementById('panel-detail').style.display = 'none';
      document.getElementById('panel-list').style.display   = 'block';
      clearHighlight();
    });

    // ── Highlight + fly ───────────────────────────────────────────────────────
    function highlightState(abbr) {
      if (!map.getSource('highlight-source')) return;
      const geo  = geoCache['states'];
      const feat = geo?.features.find(f => f.properties.STATE_ABBR === abbr);
      map.getSource('highlight-source').setData(
        feat ? { type: 'FeatureCollection', features: [feat] }
             : { type: 'FeatureCollection', features: [] }
      );
    }

    function clearHighlight() {
      map.getSource('highlight-source')?.setData({ type: 'FeatureCollection', features: [] });
    }

    function flyToState(abbr) {
      const geo  = geoCache['states'];
      const feat = geo?.features.find(f => f.properties.STATE_ABBR === abbr);
      if (!feat) return;
      const coords = feat.geometry.type === 'MultiPolygon'
        ? feat.geometry.coordinates.flat(3)
        : feat.geometry.coordinates.flat(2);
      let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
      for (const [lng, lat] of coords) {
        if (lng < minLng) minLng = lng; if (lng > maxLng) maxLng = lng;
        if (lat < minLat) minLat = lat; if (lat > maxLat) maxLat = lat;
      }
      map.fitBounds([[minLng, minLat], [maxLng, maxLat]], { padding: 60, duration: 800 });
    }

    // ── Map mode ──────────────────────────────────────────────────────────────
    function enterMapMode() {
      document.querySelector('.landing-split').classList.add('map-mode');
      document.getElementById('map-back-btn').style.display   = 'block';
      document.getElementById('layer-switcher').style.display = 'block';
      setTimeout(() => map.resize(), 350);
    }

    function exitMapMode() {
      document.querySelector('.landing-split').classList.remove('map-mode');
      document.getElementById('map-back-btn').style.display   = 'none';
      document.getElementById('layer-switcher').style.display = 'none';
      setTimeout(() => map.resize(), 350);
    }

    document.getElementById('map-back-btn').addEventListener('click', () => {
      exitMapMode();
      showLayer('states');
      map.flyTo({ center: [-98, 39], zoom: 3.8, duration: 1000 });
      if (selectedState) {
        document.getElementById('panel-list').style.display   = 'none';
        document.getElementById('panel-detail').style.display = 'block';
      }
    });

    // ── Layer switcher ────────────────────────────────────────────────────────
    function renderLayerSwitcher() {
      const container = document.getElementById('layer-switcher-btns');
      container.innerHTML = Object.entries(LAYERS).map(([key, cfg]) => `
        <div data-layer="${key}" style="
          padding:6px 10px;cursor:pointer;border-radius:6px;font-size:0.82rem;margin:2px 0;
          transition:background 0.15s;
          ${activeLayer === key
            ? 'background:rgba(255,255,255,0.15);font-weight:700;color:#fff;'
            : 'color:rgba(255,255,255,0.55);'}
        ">${cfg.label}</div>
      `).join('');
      container.querySelectorAll('[data-layer]').forEach(el => {
        el.addEventListener('click', () => showLayer(el.dataset.layer));
      });
    }

    // ── Layers ────────────────────────────────────────────────────────────────
    function clearLayers() {
      if (hoveredId !== null && map.getSource('us-source')) {
        map.setFeatureState({ source: 'us-source', id: hoveredId }, { hover: false });
      }
      hoveredId = null;
      if (layerHandlers) {
        if (layerHandlers.mousemove) map.off('mousemove', 'us-hover', layerHandlers.mousemove);
        if (layerHandlers.mouseleave) map.off('mouseleave', 'us-hover', layerHandlers.mouseleave);
        if (layerHandlers.click) map.off('click', 'us-fill', layerHandlers.click);
        layerHandlers = null;
      }
      ['us-fill', 'us-outline', 'us-hover'].forEach(id => {
        if (map.getLayer(id)) map.removeLayer(id);
      });
      if (map.getSource('us-source')) map.removeSource('us-source');
    }

    async function showLayer(key) {
      let geojson, data;
      try {
        [geojson, data] = await Promise.all([loadGeo(key), loadMembers()]);
      } catch (err) {
        console.error('showLayer: load failed for', key, err);
        return;
      }

      clearLayers();

      let fillColor, fillOpacity;
      if (key === 'districts') {
        const expr = ['match', ['get', 'districtId']];
        geojson.features.forEach(f => {
          const m = data.house[f.properties.districtId];
          expr.push(f.properties.districtId, PARTY_COLORS[m?.party] || '#cccccc');
        });
        expr.push('#cccccc');
        fillColor   = expr;
        fillOpacity = 0.55;
      } else {
        const expr = ['match', ['get', 'STATE_ABBR']];
        geojson.features.forEach(f => {
          expr.push(f.properties.STATE_ABBR, stateColor(f.properties.STATE_ABBR));
        });
        expr.push('#cccccc');
        fillColor   = expr;
        fillOpacity = 0.45;
      }

      try {
        map.addSource('us-source', { type: 'geojson', data: geojson, generateId: true });
        map.addLayer({ id: 'us-fill',    type: 'fill', source: 'us-source',
          paint: { 'fill-color': fillColor, 'fill-opacity': fillOpacity } });
        map.addLayer({ id: 'us-outline', type: 'line', source: 'us-source',
          paint: { 'line-color': '#ffffff', 'line-width': 0.6, 'line-opacity': 0.5 } });
        map.addLayer({ id: 'us-hover',   type: 'fill', source: 'us-source',
          paint: { 'fill-color': '#ffffff',
            'fill-opacity': ['case', ['boolean', ['feature-state', 'hover'], false], 0.2, 0] } });
      } catch (err) {
        console.error('showLayer: MapLibre error for', key, err);
        return;
      }

      const onMousemove = e => {
        map.getCanvas().style.cursor = 'pointer';
        const id = e.features[0].id;
        if (id !== hoveredId) {
          if (hoveredId !== null) map.setFeatureState({ source: 'us-source', id: hoveredId }, { hover: false });
          hoveredId = id;
          map.setFeatureState({ source: 'us-source', id: hoveredId }, { hover: true });
        }
      };
      const onMouseleave = () => {
        map.getCanvas().style.cursor = '';
        if (hoveredId !== null) map.setFeatureState({ source: 'us-source', id: hoveredId }, { hover: false });
        hoveredId = null;
      };
      const onClick = e => {
        if (popup) { popup.remove(); popup = null; }
        const props = e.features[0].properties;

        if (key === 'states') {
          selectState(props.STATE_ABBR);
          return;
        }

        const member = data.house[props.districtId];
        const color  = PARTY_COLORS[member?.party] || '#666';
        popup = new maplibregl.Popup({ closeButton: true, closeOnClick: false, offset: 10, className: 'preview-popup' })
          .setLngLat(e.lngLat)
          .setHTML(member ? `
            <div style="min-width:210px;font-family:inherit;">
              <div style="height:4px;background:${color};border-radius:4px 4px 0 0;"></div>
              <div style="padding:14px 16px 12px;text-align:center;">
                ${member.photo ? `<img src="${member.photo}" style="width:68px;height:68px;border-radius:50%;object-fit:cover;margin-bottom:10px;border:3px solid ${color};" onerror="this.style.display='none'">` : ''}
                <div style="font-size:1.05em;font-weight:800;color:#111;">${member.name}</div>
                <div style="font-size:0.82em;font-weight:600;color:${color};margin:2px 0 4px;">${member.party}</div>
                <div style="font-size:0.78em;color:#888;">${props.name} · ${props.stateAbbr}</div>
                <button id="rep-detail-btn" style="width:100%;margin-top:12px;padding:8px 0;background:${color};color:white;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:0.85em;">Contact &amp; Details →</button>
              </div>
            </div>` : `
            <div style="padding:12px 16px;">
              <div style="font-weight:700;color:#111;">${props.name}</div>
              <div style="color:#888;font-size:0.85em;margin-top:4px;">Seat vacant or non-voting delegate</div>
            </div>`)
          .addTo(map);

        if (member) {
          const tryAttach = (n = 0) => {
            const btn = document.getElementById('rep-detail-btn');
            if (btn) btn.addEventListener('click', () => { popup.remove(); popup = null; showRepSidebar(member, props, color); });
            else if (n < 4) setTimeout(() => tryAttach(n + 1), 150);
          };
          tryAttach();
        }
      };

      map.on('mousemove', 'us-hover', onMousemove);
      map.on('mouseleave', 'us-hover', onMouseleave);
      map.on('click', 'us-fill', onClick);
      layerHandlers = { mousemove: onMousemove, mouseleave: onMouseleave, click: onClick };

      document.getElementById('legend').style.display = key === 'districts' ? 'block' : 'none';
      if (key === 'districts') renderLegend(data);

      activeLayer = key;
      renderLayerSwitcher();
    }

    function renderLegend(data) {
      const counts = {};
      Object.values(data.house).forEach(m => { counts[m.party] = (counts[m.party] || 0) + 1; });
      document.getElementById('legend-parties').innerHTML = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([party, count]) => {
          const color = PARTY_COLORS[party] || '#888';
          return `<div style="display:flex;align-items:center;margin:6px 0;padding:4px 6px;border-radius:6px;">
            <div style="width:16px;height:16px;background:${color};border-radius:3px;margin-right:8px;flex-shrink:0;"></div>
            <span style="font-weight:700;">${party} (${count})</span>
          </div>`;
        }).join('');
    }

    function showRepSidebar(member, props, partyColor) {
      if (window.currentSidebar) { window.currentSidebar.remove(); window.currentSidebar = null; }
      const contact = member.contact || {};
      const sidebar = document.createElement('div');
      sidebar.className = 'member-detail-sidebar';
      sidebar.innerHTML = `
        <button id="sidebar-close-btn">×</button>
        <div class="hero-image" style="background-image:url('${member.photo || ''}');">
          <div class="party-stripe" style="background:${partyColor};"></div>
          <div class="image-overlay"></div>
        </div>
        <div class="member-info">
          <h3>${member.name}</h3>
          <p class="riding">${props.name} · ${props.stateAbbr}</p>
          <div class="contact-details">
            ${contact.address ? `<div class="contact-item"><strong>Office</strong><p>${contact.address}</p></div>` : ''}
            ${contact.phone   ? `<div class="contact-item"><strong>Phone</strong><p>${contact.phone}</p></div>`   : ''}
            ${contact.website ? `<div class="contact-item"><strong>Website</strong><a href="${contact.website}" target="_blank">${contact.website}</a></div>` : ''}
            ${member.profileUrl ? `<div class="contact-item"><a href="${member.profileUrl}" target="_blank" class="external-profile">View on Congress.gov →</a></div>` : ''}
          </div>
        </div>`;
      document.body.appendChild(sidebar);
      document.getElementById('sidebar-close-btn').addEventListener('click', () => {
        sidebar.remove(); window.currentSidebar = null; document.body.classList.remove('sidebar-open');
      });
      setTimeout(() => sidebar.classList.add('open'), 10);
      document.body.classList.add('sidebar-open');
      window.currentSidebar = sidebar;
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    map.on('load', async () => {
      await loadGeo('states');

      map.addSource('highlight-source', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addLayer({ id: 'state-highlight', type: 'fill', source: 'highlight-source',
        paint: { 'fill-color': '#ffffff', 'fill-opacity': 0.15 } });
      map.addLayer({ id: 'state-highlight-outline', type: 'line', source: 'highlight-source',
        paint: { 'line-color': '#ffffff', 'line-width': 2, 'line-opacity': 0.8 } });

      showLayer('states');
    });

    loadMembers().then(initPanel);

    document.getElementById('wip-close').addEventListener('click', () => {
      document.getElementById('wip-notice').classList.add('hidden');
    });

  </script>
</body>
</html>
