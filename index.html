<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polimap – Ridings in Colour</title>
<link rel="stylesheet" href="https://cdn.simpleicons.org/simpleicons.css">
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <header class="top-banner">
  <div class="banner-container">
    <div class="logo">
      <h1>PoliMap</h1>
      <span>Ridings in Colour</span>
    </div>

    <nav class="main-nav">
      <button class="nav-btn active" data-action="map">Map View</button>
      <button class="nav-btn" data-action="about">About</button>
      <button class="nav-btn" data-action="separatist">Separatist Info</button>
      <button class="nav-btn" data-action="judiciary">Alberta Judiciary</button>
      <button class="nav-btn" data-action="rcmp">Police in Alberta</button>
      <button class="nav-btn" data-action="news">News</button>
      <button class="nav-btn" data-action="gov">Alberta Government</button>
      <button class="nav-btn" data-action="contribute">Contribute</button>
      <button class="nav-btn" data-action="donate">Donate</button>
      <a class="nav-btn" href="https://forum.poli-map.org" target="_blank">Forum</a>
    </nav>
  </div>
</header>
    <div id="map"></div>

    <!-- Bottom-left control stack -->
    <div id="map-controls-stack">

      <!-- Legend (party or municipal, swapped by JS) -->
      <div id="legend" class="map-control legend-control">
          <div class="control-header">Legend</div>
          <div id="legend-parties"></div>
      </div>
      <div id="municipal-legend" class="map-control legend-control" style="display:none;">
        <div class="control-header">Legend</div>
        <div id="municipal-legend-items"></div>
      </div>
      <div id="rcmp-legend" class="map-control legend-control" style="display:none;">
        <div class="control-header">RCMP K Division</div>
        <div id="rcmp-legend-items"></div>
      </div>

      <!-- Layers -->
      <div id="layer-toggle" class="map-control layers-control">
          <div class="control-header">Layers</div>
          <button class="layer-btn active" data-layer="provincial">Provincial (MLAs)</button>
          <button class="layer-btn" data-layer="federal">Federal (MPs)</button>
          <button class="layer-btn" data-layer="municipal">Municipal</button>
          <button class="layer-btn" data-layer="rcmp">RCMP Districts</button>
          <div style="padding: 6px 0 2px;">
            <button id="rcmp-overlay-btn" class="layer-sub-btn">RCMP Boundaries: Off</button>
          </div>
          <div id="hamlet-toggle-wrap" style="display:none; padding: 6px 0 2px;">
            <button id="hamlet-toggle-btn" class="layer-sub-btn">Hamlets: Off</button>
          </div>
      </div>

    </div>

</div>
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script type="module" src="utils.js"></script>
    <script type="module" src="main.js"></script>

    <div id="wip-notice">
      <p>PoliMap is under active development. Data and features are being added regularly.</p>
      <button id="wip-close" aria-label="Dismiss">×</button>
    </div>
    <script>
      document.getElementById('wip-close').addEventListener('click', () => {
        document.getElementById('wip-notice').classList.add('hidden');
      });
    </script>
</body>
</html>
