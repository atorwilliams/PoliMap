<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polimap – Alberta Political Tool</title>

    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="map"></div>

    <!-- Legend -->
    <div id="legend" class="map-control legend-control">
        <div class="control-header">Legend</div>
        <div id="legend-parties"></div>
    </div>

    <!-- Layers -->
    <div id="layer-toggle" class="map-control layers-control">
        <div class="control-header">Layers</div>
        <button class="layer-btn active" data-layer="provincial">Provincial (MLAs)</button>
        <button class="layer-btn" data-layer="federal">Federal (MPs)</button>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.0/proj4.js"></script>
    <script type="module" src="main.js"></script>
</body>
</html>
